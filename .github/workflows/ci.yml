name: Callbox CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r backend/requirements.txt
      - name: Lint backend
        run: flake8 backend/ engine/ --max-line-length=120 --ignore=E501,W503

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shellcheck install.sh || true
          shellcheck scripts/setup_wizard.sh || true
          shellcheck scripts/update.sh || true
          shellcheck scripts/reconfigure.sh || true
